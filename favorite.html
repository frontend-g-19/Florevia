<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorites | Florévia</title>

    <link rel="icon" href="img/icon-2.png" />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />

    <!-- FONT -->
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;500;600;700&display=swap");
    </style>

    <link rel="stylesheet" href="favorite.css" />
  </head>

  <body>
    <!-- NAVBAR (same style) -->
    <nav>
      <div class="container navbar">
        <h1>
          <img src="img/icon-2.png" />
          Florévia
        </h1>

        <div class="nav-right">
          <ul>
            <li onclick="location.href = 'index.html'">Home</li>
            <li>About</li>
            <li>Blog</li>
            <li>Contact</li>
          </ul>

          <div class="nav-actions">
            <button class="active">
              <i class="ph ph-heart"></i>
            </button>
            <button>
              <i class="ph ph-shopping-cart"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- HEADER -->
    <section class="container fav-header">
      <h2>Your Favorite Flowers</h2>
      <p>Siz yoqtirgan eng chiroyli gullar ro‘yxati</p>
    </section>

    <!-- FAVORITE GRID -->
    <section class="container favorites">
      <div class="fav-grid" id="favContainer">
        <!-- CARD -->
        <div class="fav-card">
          <img src="img/qizil-atirgul.png" />
          <h3>Qizil Atirgul</h3>
          <p>150 000 so'm</p>

          <div class="fav-actions">
            <button class="remove-btn">
              <i class="ph ph-trash"></i>
            </button>
            <button class="cart-btn">
              <i class="ph ph-shopping-cart"></i>
            </button>
          </div>
        </div>

        <div class="fav-card">
          <img src="img/lavanda.jpg" />
          <h3>Lavanda</h3>
          <p>200 000 so'm</p>

          <div class="fav-actions">
            <button class="remove-btn">
              <i class="ph ph-trash"></i>
            </button>
            <button class="cart-btn">
              <i class="ph ph-shopping-cart"></i>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- EMPTY STATE -->
    <section class="container empty hidden" id="emptyState">
      <i class="ph ph-heart-break"></i>
      <h3>Favorite bo‘sh</h3>
      <p>Hozircha hech qanday mahsulot qo‘shilmagan</p>
      <button onclick="location.href = 'index.html'">Shop Now</button>
    </section>
  </body>
</html>
