<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart | Florévia</title>

    <link rel="icon" href="img/icon-2.png" />

    <!-- ICON -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;500;600;700&display=swap");
    </style>

    <link rel="stylesheet" href="cart.css" />
  </head>

  <body>
    <!-- NAV -->
    <nav>
      <div class="container navbar">
        <h1>
          <img src="img/icon-2.png" />
          Florévia
        </h1>

        <div class="nav-right">
          <ul>
            <li onclick="location.href = 'index.html'">Home</li>
            <li>About</li>
            <li>Blog</li>
            <li>Contact</li>
          </ul>

          <div class="nav-actions">
            <button onclick="location.href = 'favorite.html'">
              <i class="ph ph-heart"></i>
            </button>
            <button class="active">
              <i class="ph ph-shopping-cart"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- HEADER -->
    <section class="container cart-header">
      <h2>Your Cart</h2>
      <p>Siz tanlagan mahsulotlar</p>
    </section>

    <!-- CART WRAPPER -->
    <section class="container cart-wrapper" id="cartWrapper">
      <!-- LEFT -->
      <div class="cart-items" id="cartItems"></div>

      <!-- RIGHT SUMMARY -->
      <div class="cart-summary">
        <h3>Order Summary</h3>

        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotalText">0 so'm</span>
        </div>

        <div class="summary-row">
          <span>Delivery</span>
          <span id="deliveryText">20 000 so'm</span>
        </div>

        <div class="summary-row total">
          <span>Total</span>
          <span id="totalText">0 so'm</span>
        </div>

        <button class="checkout-btn">Checkout</button>
      </div>
    </section>

    <!-- EMPTY -->
    <section class="container empty hidden" id="emptyCartState">
      <i class="ph ph-shopping-cart-simple"></i>
      <h3>Savatcha bo‘sh</h3>
      <p>Hozircha hech nima qo‘shilmadi</p>
      <button onclick="location.href = 'index.html'">Shop Now</button>
    </section>

    <div id="toast" class="toast hidden"></div>
  </body>
  <script src="cart.js"></script>
</html>
